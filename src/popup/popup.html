<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm</title>
    <link rel="stylesheet" href="../styles/tokens.css">
    <link rel="stylesheet" href="popup.css">
    <!-- Inline font import for reliability -->
    <!-- Fonts are loaded locally in popup.css -->
</head>
<body>
    <div id="app">
      <header>
            <div class="logo-container">
                <img src="../../icon128.png" alt="Rhythm Logo" class="logo-img">
                <h1>Rhythm</h1>
            </div>
            <div class="header-actions">
                <button id="donate-btn" class="icon-btn-circle donate-btn" title="Support the Project" aria-label="Support the project">❤</button>
                <div id="theme-status" class="card-counter">V1.0.0</div>
            </div>
      </header>

        <div id="focus-banner" class="focus-banner">
            <span id="focus-status" class="focus-timer" data-i18n="focus">Focus</span>
            <div id="focus-chips" class="focus-chips" role="group" aria-label="Start a focus session">
                <button class="focus-chip" data-minutes="15">15m</button>
                <button class="focus-chip" data-minutes="30">30m</button>
                <button class="focus-chip" data-minutes="60">1h</button>
                <button id="focus-custom-btn" class="focus-chip" data-i18n="custom">Custom</button>
            </div>
            <div id="focus-custom" class="focus-custom" hidden>
                <input id="focus-custom-input" type="number" min="1" max="720" placeholder="min" data-i18n-placeholder="minPlaceholder" aria-label="Focus duration in minutes">
                <button id="focus-custom-start" class="focus-chip" data-i18n="start">Start</button>
                <button id="focus-custom-cancel" class="focus-chip" aria-label="Cancel">×</button>
            </div>
            <button id="focus-toggle" class="focus-btn" data-i18n="end" hidden>End</button>
        </div>

        <main id="dashboard">
            <div class="empty-state">Loading your rhythm...</div>
        </main>

        <section id="notes-section" class="section-container">
            <div class="section-header collapsible-trigger" aria-expanded="false" aria-controls="notes-content" role="button" tabindex="0">
                <h2 data-i18n="quickNotes">Quick Notes</h2>
                <div class="notes-header-actions">
                    <button id="add-note-btn" class="icon-btn-circle" aria-label="Add Note">+</button>
                    <span class="chevron">▼</span>
                </div>
            </div>
            <div id="notes-content" class="collapsible-content">
                <div id="notes-list"></div>
            </div>
        </section>

        <section id="advanced-section" class="section-container">
            <button type="button" class="section-header collapsible-trigger" aria-expanded="false" aria-controls="advanced-content">
                <h2 data-i18n="settings">Settings</h2>
                <span class="chevron">▼</span>
            </button>
            <div id="advanced-content" class="collapsible-content">
                <div class="setting-row" style="margin-top: var(--space-3);">
                    <label data-i18n="masterToggle">Master Toggle</label>
                    <label class="toggle">
                        <input type="checkbox" id="master-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <label for="theme-toggle" data-i18n="darkMode">Dark Mode</label>
                    <label class="toggle">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <label for="sound-toggle" data-i18n="sound">Sound</label>
                    <label class="toggle">
                        <input type="checkbox" id="sound-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <label for="language-select" data-i18n="language">Language</label>
                    <select id="language-select"></select>
                </div>
                <div class="btn-group">
                    <button id="export-btn" class="secondary" data-i18n="exportJson">Export JSON</button>
                    <button id="reset-btn" class="secondary danger-text" data-i18n="resetData">Reset Data</button>
                </div>
                <div id="debug-logs">
                    <div id="log-list"></div>
                </div>
            </div>
        </section>

        <div id="confetti-container"></div>
    </div>
    <script src="popup.js" type="module"></script>
</body>
</html>
